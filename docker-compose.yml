version: '3.8'
services:
  olympus-db:
    image: postgres:15-alpine
    container_name: olympus-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  olympus-server:
    build: .
    container_name: olympus-server
    depends_on:
      olympus-db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file:
      - .env

# This section tells Docker to create the persistent storage for your DB
volumes:
  postgres_data: